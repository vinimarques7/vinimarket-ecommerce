version: "3.9"

x-common: &common
  restart: unless-stopped
  environment:
    JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}

services:
  # ─── Usuários ──────────────────────────────────────────────────────────
  users:
    <<: *common
    build: ./users
    container_name: users
    ports:
      - "5001:5001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      PORT: 5001
      DB_PATH: /data/users.db
    volumes:
      - users_data:/data

  # ─── Produtos (primário) ───────────────────────────────────────────────
  products:
    <<: *common
    build: ./products
    container_name: products
    ports:
      - "5002:5002"
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      PORT: 5002
      DB_PATH: /data/products.db
      IS_PRIMARY: "true"
      REPLICA_URL: http://products-replica:5012
    volumes:
      - products_primary_data:/data
    depends_on:
      - products-replica

  # ─── Produtos (réplica) ────────────────────────────────────────────────
  products-replica:
    <<: *common
    build: ./products
    container_name: products-replica
    ports:
      - "5012:5012"
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      PORT: 5012
      DB_PATH: /data/products_replica.db
      IS_PRIMARY: "false"
      REPLICA_URL: ""
    volumes:
      - products_replica_data:/data

  # ─── Pedidos ───────────────────────────────────────────────────────────
  orders:
    <<: *common
    build: ./orders
    container_name: orders
    ports:
      - "5003:5003"
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      PORT: 5003
      DB_PATH: /data/orders.db
    volumes:
      - orders_data:/data

  # ─── API Gateway ───────────────────────────────────────────────────────
  gateway:
    <<: *common
    build: ./gateway
    container_name: gateway
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      PORT: 8000
      USERS_URL: http://users:5001
      PRODUCTS_URL: http://products:5002
      ORDERS_URL: http://orders:5003
      HEARTBEAT_INTERVAL: 5
      HEARTBEAT_MAX_FAIL: 2
    depends_on:
      - users
      - products
      - orders

  # ─── Frontend ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

  # ─── TLS: geração de certificados auto-assinados ────────────────────────
  cert-init:
    image: alpine:3.19
    container_name: cert-init
    volumes:
      - certs_data:/certs
    command: >
      sh -c "apk add --no-cache openssl -q &&
             ([ -f /certs/cert.pem ] && echo 'Certs já existem' ||
             openssl req -x509 -nodes -days 365 -newkey rsa:2048
             -keyout /certs/key.pem -out /certs/cert.pem
             -subj '/CN=localhost/O=ViniMarket/C=BR'
             -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1'
             && echo 'Certificados TLS gerados')"
    restart: "no"

  # ─── TLS: proxy HTTPS (443) → gateway (8000) ───────────────────────────
  ssl-proxy:
    image: nginx:alpine
    container_name: ssl-proxy
    ports:
      - "8443:443"    # HTTPS externo
      - "8080:80"     # HTTP → redireciona para HTTPS
    volumes:
      - certs_data:/etc/nginx/certs:ro
      - ./ssl-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      gateway:
        condition: service_started
    restart: unless-stopped

volumes:
  users_data:
  products_primary_data:
  products_replica_data:
  orders_data:
  certs_data:
